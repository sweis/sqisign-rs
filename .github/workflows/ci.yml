name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Enables the BMI2/ADX inline-asm GF backend at lvl1.
  RUSTFLAGS: -C target-cpu=native

jobs:
  verify-only:
    name: verify-only (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features: [lvl1, lvl3, lvl5, "lvl1,gf-portable"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}
      - name: Build
        run: cargo build --release --no-default-features --features ${{ matrix.features }}
      - name: Test
        run: cargo test --release --no-default-features --features ${{ matrix.features }}
      - name: Clippy
        run: cargo clippy --no-default-features --features ${{ matrix.features }} -- -D clippy::correctness -D clippy::suspicious

  sign:
    name: sign (${{ matrix.level }}, ${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        level: [lvl1, lvl3, lvl5]
        backend: [sign, gmp, cryptobigint]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.level }}-${{ matrix.backend }}
      - name: Install GMP
        if: matrix.backend == 'gmp'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev m4
      - name: Build
        run: cargo build --release --no-default-features --features ${{ matrix.level }},${{ matrix.backend }}
      - name: Test
        env:
          # cryptobigint sign is ~400-1500x slower; lvl5 is ~5 min/vector.
          KAT_SIGN_LIMIT: ${{ matrix.backend == 'cryptobigint' && (matrix.level == 'lvl5' && '1' || '2') || '10' }}
          # cryptobigint Ibz is 4KB at lvl5 (IBZ_LIMBS=512); deep
          # quaternion/id2iso call chains overflow the 2MB default test
          # thread stack. Bump to 16MB for that backend.
          RUST_MIN_STACK: ${{ matrix.backend == 'cryptobigint' && '16777216' || '' }}
        run: cargo test --release --no-default-features --features ${{ matrix.level }},${{ matrix.backend }}
      - name: Clippy
        run: cargo clippy --no-default-features --features ${{ matrix.level }},${{ matrix.backend }} -- -D clippy::correctness -D clippy::suspicious

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
