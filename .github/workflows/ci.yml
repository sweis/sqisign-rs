name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-only:
    name: verify-only (${{ matrix.level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        level: [lvl1, lvl3, lvl5]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.level }}
      - name: Build
        run: cargo build --release --no-default-features --features ${{ matrix.level }}
      - name: Test
        run: cargo test --release --no-default-features --features ${{ matrix.level }}
      - name: Clippy
        run: cargo clippy --no-default-features --features ${{ matrix.level }} -- -D clippy::correctness -D clippy::suspicious

  sign:
    name: sign (${{ matrix.level }}, ${{ matrix.backend }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        level: [lvl1, lvl3, lvl5]
        backend: [sign, gmp]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.level }}-${{ matrix.backend }}
      - name: Install GMP
        if: matrix.backend == 'gmp'
        run: sudo apt-get update && sudo apt-get install -y libgmp-dev m4
      - name: Build
        run: cargo build --release --no-default-features --features ${{ matrix.level }},${{ matrix.backend }}
      - name: Test (KAT_SIGN_LIMIT=10)
        run: KAT_SIGN_LIMIT=10 cargo test --release --no-default-features --features ${{ matrix.level }},${{ matrix.backend }}
      - name: Clippy
        run: cargo clippy --no-default-features --features ${{ matrix.level }},${{ matrix.backend }} -- -D clippy::correctness -D clippy::suspicious

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
